<script>
(function() {
  function setTheme(t) {
    var root = document.documentElement;
    root.classList.remove('dark', 'light');
    root.classList.add(t);
    try { localStorage.setItem('theme', t); } catch (e) {}
  }

  function getTheme() {
    var root = document.documentElement;
    if (root.classList.contains('dark')) return 'dark';
    if (root.classList.contains('light')) return 'light';
    return null;
  }

  var btn = document.getElementById('theme-toggle');
  if (!btn) return;

  btn.addEventListener('click', function() {
    var cur = getTheme() || 'dark';
    setTheme(cur === 'dark' ? 'light' : 'dark');
  });
})();
</script>

<script>
(function() {
  var btn = document.getElementById('ef-totop');
  if (!btn) return;

  var raf = 0;

  function update() {
    raf = 0;
    var y = window.scrollY || document.documentElement.scrollTop || 0;
    if (y > 400) btn.classList.add('is-visible');
    else btn.classList.remove('is-visible');
  }

  window.addEventListener('scroll', function() {
    if (!raf) raf = requestAnimationFrame(update);
  }, { passive: true });

  update();

  btn.addEventListener('click', function() {
    try {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    } catch (e) {
      window.scrollTo(0, 0);
    }
  });
})();
</script>

<script>
(function() {
  var lead = document.querySelector('.hero__lead');
  if (!lead) return;

  var bolds = lead.querySelectorAll('strong, b');
  if (!bolds.length) return;

  var items = [];
  bolds.forEach(function(b) {
    var text = b.textContent;
    b.textContent = '';
    var span = document.createElement('span');
    span.className = 'typed-word';
    b.appendChild(span);
    items.push({ span: span, text: text });
  });

  var idx = 0;

  function typeNext() {
    if (idx >= items.length) return;
    var item = items[idx];
    item.span.classList.add('typed-word--typing');
    var ci = 0;
    function tick() {
      if (ci >= item.text.length) {
        item.span.classList.remove('typed-word--typing');
        item.span.classList.add('typed-word--done');
        idx++;
        setTimeout(typeNext, 400);
        return;
      }
      item.span.textContent += item.text[ci];
      ci++;
      setTimeout(tick, 45);
    }
    tick();
  }

  setTimeout(typeNext, 800);
})();
</script>
